<!DOCTYPE html>
<html>
<head>
    <title>Seller Graph</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f8;
            padding: 20px;
            text-align: center;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="card">
<h2>Seller Comparison - {{book.title}}</h2>
<img src="{{ url_for('static', filename=graph) }}" width="500">
<br><br>
<a href="/">⬅ Back</a>
</div>
</body>
</html>
