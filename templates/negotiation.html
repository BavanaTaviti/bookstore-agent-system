<!DOCTYPE html>
<html>
<head>
    <title>Negotiation</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f0f2f5;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #34495e;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .buyer { color: green; font-weight: bold; }
        .seller { color: red; font-weight: bold; }
        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="card">
<h2>Negotiation Simulation</h2>
<table>
<tr>
    <th>Round</th>
    <th>Buyer Offer</th>
    <th>Seller Price</th>
</tr>
{% for r in rounds %}
<tr>
    <td>{{r.round}}</td>
    <td class="buyer">₹{{r.buyer_offer}}</td>
    <td class="seller">₹{{r.seller_price}}</td>
</tr>
{% endfor %}
</table>
<div class="result">
    Final Price: ₹{{final_price}} <br><br>
    Decision:
    {% if decision %}
        <span style="color:green;">✅ Accepted</span>
    {% else %}
        <span style="color:red;">❌ Rejected</span>
    {% endif %}
</div>
<br>
<a href="/">Back</a>
</div>
</body>
</html>
