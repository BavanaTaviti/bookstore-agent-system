<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <style>
        body {
            font-family: 'Segoe UI';
            background: #f4f6f8;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        .btn {
            padding: 5px 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="card">
<h2>🛒 Your Cart</h2>
{% if items|length == 0 %}
    <p>Cart is empty</p>
{% else %}
<table>
<tr>
    <th>Book</th>
    <th>Price</th>
    <th>Action</th>
</tr>
{% for item in items %}
<tr>
    <td>{{item.title}}</td>
    <td>₹{{item.base_price}}</td>
    <td>
        <a href="/remove-from-cart/{{item.title}}">
            <button class="btn">Remove</button>
        </a>
    </td>
</tr>
{% endfor %}
</table>
<h3>Total: ₹{{total}}</h3>
{% endif %}
<br>
<a href="/">⬅ Back to Home</a>
</div>
</body>
</html>
